include: package:very_good_analysis/analysis_options.yaml

linter:
  rules:
    # Not applicable to a private app — no external API consumers.
    public_member_api_docs: false

    # Deferred to follow-up PR: requires reformatting Flutter widget trees.
    lines_longer_than_80_chars: false

    # Deferred to follow-up PR: each site needs a judgment call on async safety.
    discarded_futures: false
    avoid_catches_without_on_clauses: false
    avoid_dynamic_calls: false
    unawaited_futures: false
    cast_nullable_to_non_nullable: false

    # Deferred to follow-up PR: API design concern — affects method signatures.
    avoid_positional_boolean_parameters: false
