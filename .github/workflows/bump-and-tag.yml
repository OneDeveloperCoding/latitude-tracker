name: Release

run-name: "release — ${{ github.actor }} @ ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Override auto-detected bump (leave blank to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
        default: ''
  workflow_call:
    inputs:
      bump_override:
        description: 'Override auto-detected bump (leave blank to auto-detect from commits)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_call runs in the caller's ref context (develop), so pin to main explicitly.
          ref: ${{ github.event_name == 'workflow_call' && 'main' || '' }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Validate branch
        # Ship workflow guarantees main is up to date before calling this; skip for workflow_call.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "ERROR: Release must be triggered from main, not '${GITHUB_REF_NAME}'."
            echo "Merge develop → main via PR first, then trigger this workflow."
            exit 1
          fi

      - name: Get latest tag
        id: latest_tag
        run: |
          # git describe can't find tags across merge commits from other branches;
          # sorting all fetched tags by semver is reliable regardless of graph shape.
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Detect bump from commits since last tag
        id: detect_bump
        run: |
          LAST_TAG="${{ steps.latest_tag.outputs.tag }}"
          OVERRIDE="${{ inputs.bump_override }}"

          if [ -n "$OVERRIDE" ]; then
            echo "bump=$OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "Using override: $OVERRIDE"
            exit 0
          fi

          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s %b")

          BUMP="patch"

          if echo "$COMMITS" | grep -qiE "BREAKING.CHANGE|^(feat|fix|refactor|perf)(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Auto-detected bump: $BUMP"

      - name: Compute next version
        id: next_version
        run: |
          LAST_TAG="${{ steps.latest_tag.outputs.tag }}"
          BUMP="${{ steps.detect_bump.outputs.bump }}"

          VERSION="${LAST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION_CODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEW_TAG (bump: $BUMP from $LAST_TAG)"

      - name: Show commits included in this release
        run: |
          LAST_TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            git log --oneline
          else
            git log "${LAST_TAG}..HEAD" --oneline
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Restore Firebase config
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          printf '%s' "$FIREBASE_OPTIONS_DART" | base64 -d > lib/firebase_options.dart
          printf '%s' "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          printf '%s' "$FIREBASE_JSON" | base64 -d > firebase.json

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE" | tr -dc 'A-Za-z0-9+/=' | base64 -d > android/release.keystore
          if [ ! -s android/release.keystore ]; then
            echo "ERROR: RELEASE_KEYSTORE secret is empty or base64-invalid"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${{ steps.next_version.outputs.new_tag }}"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_CODE="${{ steps.next_version.outputs.version_code }}"
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/latitude-tracker-${{ steps.next_version.outputs.new_tag }}.apk

      # Tag only after a successful build — prevents orphan tags from failed runs.
      # Version is baked into the APK via --build-name/--build-number; no branch commit needed.
      - name: Tag and push
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.next_version.outputs.new_tag }}
          name: ${{ steps.next_version.outputs.new_tag }}
          files: build/app/outputs/flutter-apk/latitude-tracker-${{ steps.next_version.outputs.new_tag }}.apk
          fail_on_unmatched_files: true
