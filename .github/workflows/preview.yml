name: Preview build

run-name: "preview — ${{ github.ref_name }}@${{ github.sha }}"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute preview label
        id: label
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "apk_name=latitude-tracker-preview-${SAFE_BRANCH}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Restore Firebase config
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE" | tr -dc 'A-Za-z0-9+/=' | base64 -d > android/release.keystore
          if [ ! -s android/release.keystore ]; then
            echo "ERROR: RELEASE_KEYSTORE secret is empty or base64-invalid"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload preview APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.label.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
