name: Ship

run-name: "ship — ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Override version bump (leave blank to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge develop → main
    runs-on: ubuntu-latest
    steps:
      - name: Create or find PR develop → main
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base main --head develop --state open \
            --json number --jq 'if length > 0 then .[0].number | tostring else "" end')

          if [ -n "$EXISTING" ]; then
            echo "number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$EXISTING"
          else
            NUMBER=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base main --head develop \
              --title "release: merge develop into main" \
              --body "Automated release — triggered via Ship workflow by @${{ github.actor }}." \
              --json number --jq '.number')
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
            echo "Created PR #$NUMBER"
          fi

      - name: Wait for CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checks "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --watch --interval 30

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --merge

  release:
    name: Build & tag release
    needs: merge
    uses: ./.github/workflows/bump-and-tag.yml
    with:
      bump_override: ${{ inputs.bump_override }}
    secrets: inherit
